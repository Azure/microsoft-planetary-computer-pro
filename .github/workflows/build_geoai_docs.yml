name: Build and Deploy GeoAI Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/geoai/**"
  workflow_dispatch:

concurrency:
  group: "pages-geoai"
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/geoai/requirements.txt

      - name: Build Jupyter Book
        run: |
          jupyter-book build docs/geoai

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/geoai/_build/html
          destination_dir: geoai
